<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — Bingo VIP Club</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  :root{ --neon:#8b5cff; --neon-2:#22d3ee; --yellow:#FFD700; --text:#f3f1ff; --muted:#9d96d4; }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
  body{
    background:linear-gradient(180deg,#05052e 0%,#04042a 100%);color:var(--text);
    min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:auto;padding:20px;
  }
  @media (max-height:720px){
    body{align-items:flex-start;padding-top:24px;padding-bottom:24px;}
  }
  .orb{position:fixed;border-radius:50%;filter:blur(70px);opacity:.45;z-index:0;pointer-events:none;}
  .orb.a{width:360px;height:360px;background:#8b5cff;top:-100px;right:-70px;}
  .orb.b{width:300px;height:300px;background:#22d3ee;bottom:-110px;left:-80px;}
  .card{
    position:relative;z-index:1;width:100%;max-width:400px;
    background:linear-gradient(160deg,rgba(20,26,62,.85),rgba(8,10,32,.8));
    border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:28px 26px;
    box-shadow:0 20px 60px rgba(139,92,255,.3), inset 0 1px 0 rgba(255,255,255,.14);
  }
  .logo-text{
    display:block;text-align:center;font-weight:800;font-size:30px;letter-spacing:2px;margin-bottom:6px;
    background:linear-gradient(180deg,#E8C87A 0%,#B8860B 50%,#8a6304 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 2px 4px rgba(0,0,0,.7);
  }
  .subtitle{text-align:center;color:var(--muted);font-size:13px;margin-bottom:18px;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;}
  .tabs button{
    flex:1;padding:10px;border:none;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;
    background:rgba(255,255,255,.06);color:var(--muted);transition:all .2s;
  }
  .tabs button.active{background:linear-gradient(145deg,var(--neon),var(--neon-2));color:#fff;box-shadow:0 6px 18px rgba(139,92,255,.4);}
  label{display:block;font-size:12px;color:var(--yellow);font-weight:600;margin:12px 0 6px;text-transform:uppercase;}
  input{
    width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.14);
    background:rgba(0,0,0,.3);color:#fff;font-size:15px;outline:none;
  }
  input:focus{border-color:var(--neon-2);box-shadow:0 0 10px rgba(34,211,238,.4);}
  .btn{
    width:100%;margin-top:20px;padding:13px;border:none;border-radius:14px;cursor:pointer;
    background:linear-gradient(145deg,var(--neon),var(--neon-2));color:#fff;font-weight:800;font-size:15px;
    box-shadow:0 8px 24px rgba(139,92,255,.5);transition:transform .12s,filter .12s;
  }
  .btn:hover{filter:brightness(1.1);} .btn:active{transform:translateY(2px);}
  .btn-demo{background:linear-gradient(145deg,#22d3ee,#8b5cff);margin-top:10px;}
  .demo-name-row{margin-top:8px;}
  .demo-name-row input{margin-top:0;}
  .demo-name-row small{display:block;color:var(--muted);font-size:10px;margin-top:3px;}
  .msg{margin-top:14px;text-align:center;font-size:13px;min-height:18px;color:#ff6b81;}
  .hint{margin-top:16px;text-align:center;font-size:11px;color:var(--muted);line-height:1.6;}
</style>
</head>
<body>
  <div class="orb a"></div><div class="orb b"></div>
  <div class="card">
    <span class="logo-text">BINGO VIP CLUB</span>
    <div class="subtitle">Entre para jogar o bingo ao vivo</div>

    <div class="tabs">
      <button id="tabLogin" class="active" type="button" onclick="mostrarAba('login')">Entrar</button>
      <button id="tabRegister" type="button" onclick="mostrarAba('register')">Criar conta</button>
    </div>

    <!-- LOGIN -->
    <form id="authLogin" onsubmit="return false">
      <label for="loginCpf">CPF</label>
      <input id="loginCpf" inputmode="numeric" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)">
      <label for="loginSenha">Senha</label>
      <input id="loginSenha" type="password" autocomplete="current-password" placeholder="••••••••">
      <button class="btn" type="button" onclick="fazerLogin()">Entrar</button>
      <div class="msg" id="loginError"></div>
    </form>

    <!-- CADASTRO -->
    <form id="authRegister" style="display:none" onsubmit="return false">
      <label for="regNome">Nome completo</label>
      <input id="regNome" placeholder="Seu nome">
      <label for="regCpf">CPF</label>
      <input id="regCpf" inputmode="numeric" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)">
      <label for="regEmail">E-mail</label>
      <input id="regEmail" type="email" placeholder="voce@email.com">
      <label for="regChavePix">Chave Pix</label>
      <input id="regChavePix" placeholder="CPF, e-mail, telefone ou chave aleatória">
      <label for="regSenha">Senha</label>
      <input id="regSenha" type="password" placeholder="mín. 4 caracteres">
      <label for="regConfirma">Confirmar senha</label>
      <input id="regConfirma" type="password" placeholder="repita a senha">
      <button class="btn" type="button" onclick="registrar()">Criar conta</button>
      <div class="msg" id="regError"></div>
    </form>

    <div class="hint">Conta nova ganha <b>R$ 10,00</b> de bônus.<br>Informe CPF e chave Pix para saque de prêmios.</div>
  </div>

<script>
  function mostrarAba(aba){
    document.getElementById('authRegister').style.display = aba==='register' ? 'block':'none';
    document.getElementById('authLogin').style.display = aba==='login' ? 'block':'none';
    document.getElementById('tabLogin').classList.toggle('active', aba==='login');
    document.getElementById('tabRegister').classList.toggle('active', aba==='register');
    document.getElementById('regError').textContent='';
    document.getElementById('loginError').textContent='';
  }

  function mascaraCPF(input){
    let v=input.value.replace(/\D/g,'').slice(0,11);
    if(v.length>9) v=v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');
    else if(v.length>6) v=v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
    else if(v.length>3) v=v.replace(/(\d{3})(\d{1,3})/,'$1.$2');
    input.value=v;
  }

  function validarCPF(cpf){
    const nums=cpf.replace(/\D/g,'');
    if(nums.length!==11) return false;
    if(/^(\d)\1{10}$/.test(nums)) return false;
    let sum=0; for(let i=0;i<9;i++) sum+=parseInt(nums[i])*(10-i);
    let d1=sum%11<2?0:11-(sum%11);
    if(parseInt(nums[9])!==d1) return false;
    sum=0; for(let i=0;i<10;i++) sum+=parseInt(nums[i])*(11-i);
    let d2=sum%11<2?0:11-(sum%11);
    if(parseInt(nums[10])!==d2) return false;
    return true;
  }

  async function fazerLogin(){
    const cpf=document.getElementById('loginCpf').value.trim();
    const senha=document.getElementById('loginSenha').value;
    const err=document.getElementById('loginError');
    if(!cpf||!senha){ err.textContent='Preencha CPF e senha.'; return; }
    err.textContent='Entrando...'; err.style.color='#9d96d4';
    try{
      const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cpf,senha})});
      const data=await r.json();
      if(!r.ok){ err.style.color='#ff6b81'; err.textContent=data.error||'Erro ao entrar.'; return; }
      localStorage.setItem('bingo_session_token',data.sessionToken);
      localStorage.setItem('bingo_meu_cpf',data.cpf);
      location.href='/';
    }catch(e){ err.style.color='#ff6b81'; err.textContent='Falha de conexão.'; }
  }

  async function registrar(){
    const nome=document.getElementById('regNome').value.trim();
    const cpf=document.getElementById('regCpf').value.trim();
    const email=document.getElementById('regEmail').value.trim();
    const chavePix=document.getElementById('regChavePix').value.trim();
    const senha=document.getElementById('regSenha').value;
    const confirma=document.getElementById('regConfirma').value;
    const err=document.getElementById('regError');
    if(!nome||!cpf||!email||!senha||!confirma||!chavePix){ err.textContent='Preencha todos os campos.'; return; }
    if(!validarCPF(cpf)){ err.textContent='CPF inválido.'; return; }
    if(senha.length<4){ err.textContent='Senha deve ter no mínimo 4 caracteres.'; return; }
    if(senha!==confirma){ err.textContent='Senhas não conferem.'; return; }
    err.textContent='Criando conta...'; err.style.color='#9d96d4';
    try{
      const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome,cpf,email,senha,confirma,chavePix})});
      const data=await r.json();
      if(!r.ok){ err.style.color='#ff6b81'; err.textContent=data.error||'Erro ao cadastrar.'; return; }
      localStorage.setItem('bingo_session_token',data.sessionToken);
      localStorage.setItem('bingo_meu_cpf',data.cpf);
      location.href='/';
    }catch(e){ err.style.color='#ff6b81'; err.textContent='Falha de conexão.'; }
  }
</script>
</body>
</html>
