services:
  - type: web
    name: bingo-vip-club
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SESSION_SECRET
        generateValue: true
      - key: DRAW_INTERVAL
        value: 3000
      - key: INTERMISSION
        value: 60000
      - key: BOTS
        value: "1"
